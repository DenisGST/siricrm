{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход в SiriCRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
    }

    /* Material outlined input */
    .m-field {
      position: relative;
      margin-bottom: 18px;
    }
    .m-field input {
      width: 100%;
      height: 52px;
      padding: 16px 14px;
      font-size: 15px;
      color: #212121;
      background: #ffffff;
      border: 1px solid #E0E0E0;
      border-radius: 4px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
      box-sizing: border-box;
    }
    .m-field input:hover {
      border-color: #9E9E9E;
    }
    .m-field input:focus {
      border-color: #1E88E5;
      box-shadow: inset 0 0 0 1px #1E88E5;
    }

    /* Floating label */
    .m-field label {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      padding: 0 4px;
      font-size: 15px;
      color: #9E9E9E;
      background: #ffffff;
      pointer-events: none;
      transition: all .15s ease;
    }
    .m-field input:focus + label,
    .m-field input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 12px;
      color: #1E88E5;
    }
    .m-field input:not(:focus):not(:placeholder-shown) + label {
      color: #757575;
    }

    /* Иконка-глаз */
    .m-field .pwd-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #9E9E9E;
      border-radius: 50%;
      background: transparent;
      border: none;
    }
    .m-field .pwd-toggle:hover { color: #424242; background: #f5f5f5; }

    /* Кнопка */
    .m-btn {
      width: 100%;
      height: 48px;
      background: #1E88E5;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background-color .15s ease, box-shadow .15s ease;
      text-transform: uppercase;
    }
    .m-btn:hover { background: #1976D2; box-shadow: 0 2px 6px rgba(30,136,229,0.35); }
    .m-btn:active { background: #1565C0; }

    .m-error {
      padding: 10px 14px;
      background: #FFEBEE;
      color: #C62828;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .m-hint {
      font-size: 13px;
      color: #757575;
      text-align: center;
      margin-bottom: 14px;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <div style="width:100%;max-width:380px;padding:24px;">

    <!-- Логотип / название -->
    <div style="text-align:center;margin-bottom:32px;">
      <div style="
        width:56px;height:56px;border-radius:14px;margin:0 auto 12px;
        background:linear-gradient(135deg,#1E88E5,#1565C0);
        display:flex;align-items:center;justify-content:center;
        color:#fff;font-size:28px;font-weight:700;letter-spacing:-1px;">S</div>
      <h1 style="font-size:24px;font-weight:600;color:#212121;margin:0 0 4px;">SiriCRM</h1>
      <p style="font-size:13px;color:#757575;margin:0;">Вход в систему</p>
    </div>

    {% if form.errors %}
      <div class="m-error">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        Некорректный логин или пароль.
      </div>
    {% endif %}

    {% if next %}
      <p class="m-hint">Для доступа нужно авторизоваться</p>
    {% endif %}

    <form method="post" action="{% url 'login' %}" autocomplete="on" novalidate>
      {% csrf_token %}

      <div class="m-field">
        <input id="id_username" name="username" type="text" placeholder=" "
               autocomplete="username" autofocus required>
        <label for="id_username">Имя пользователя</label>
      </div>

      <div class="m-field">
        <input id="id_password" name="password" type="password" placeholder=" "
               autocomplete="current-password" required
               style="padding-right:44px;">
        <label for="id_password">Пароль</label>
        <button type="button" class="pwd-toggle" tabindex="-1"
                onclick="(function(b){var i=document.getElementById('id_password');var t=i.type==='password'?'text':'password';i.type=t;b.querySelector('svg').innerHTML=(t==='password')?'<path d=&quot;M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z&quot;/><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;3&quot;/><line x1=&quot;2&quot; y1=&quot;22&quot; x2=&quot;22&quot; y2=&quot;2&quot;/>':'<path d=&quot;M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z&quot;/><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;3&quot;/>';})(this);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="2" y1="22" x2="22" y2="2"/>
          </svg>
        </button>
      </div>

      <input type="hidden" name="next" value="{{ next }}">

      <button type="submit" class="m-btn">Войти</button>
    </form>
  </div>
</body>
</html>
