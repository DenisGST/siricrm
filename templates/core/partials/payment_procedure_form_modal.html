<dialog id="payment-procedure-modal" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-lg">
    <h3 class="font-bold text-lg mb-4">
      {% if obj %}Редактирование порядка оплаты{% else %}Новый порядок оплаты{% endif %}
    </h3>
    <form hx-post="{% if obj %}{% url 'core:reference_payment_procedure_edit' obj.pk %}{% else %}{% url 'core:reference_payment_procedure_add' %}{% endif %}"
          hx-target="#payment-procedure-modal" hx-swap="outerHTML"
          class="space-y-3">
      {% csrf_token %}

      <div>
        <label class="label py-1"><span class="label-text">Полное наименование</span></label>
        <input type="text" name="full_name" value="{{ form.full_name.value|default:'' }}"
               class="input input-bordered w-full input-sm" required>
        {% if form.full_name.errors %}<span class="text-error text-xs">{{ form.full_name.errors.0 }}</span>{% endif %}
      </div>

      <div>
        <label class="label py-1"><span class="label-text">Сокращённое наименование</span></label>
        <input type="text" name="short_name" value="{{ form.short_name.value|default:'' }}"
               class="input input-bordered w-full input-sm" required>
      </div>

      <div>
        <label class="label py-1"><span class="label-text">Описание</span></label>
        <textarea name="description" rows="3"
                  class="textarea textarea-bordered w-full textarea-sm">{{ form.description.value|default:'' }}</textarea>
      </div>

      <div>
        <label class="label cursor-pointer justify-start gap-2">
          <input type="checkbox" name="is_active" class="checkbox checkbox-sm"
                 {% if form.is_active.value %}checked{% endif %}>
          <span class="label-text">Активен</span>
        </label>
      </div>

      {% if form.non_field_errors %}
        <div class="alert alert-error text-sm">{{ form.non_field_errors }}</div>
      {% endif %}

      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
        <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>
