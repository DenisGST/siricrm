<dialog id="tag-modal" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-lg">
    <h3 class="font-bold text-lg mb-4">
      {% if obj %}Редактирование тега{% else %}Новый тег{% endif %}
    </h3>
    <form hx-post="{% if obj %}{% url 'core:reference_tag_edit' obj.pk %}{% else %}{% url 'core:reference_tag_add' %}{% endif %}"
          hx-target="#tag-modal" hx-swap="outerHTML"
          class="space-y-3">
      {% csrf_token %}

      <div>
        <label class="label py-1"><span class="label-text">Сотрудник</span></label>
        {{ form.employee }}
      </div>

      <div>
        <label class="label py-1"><span class="label-text">Наименование тега</span></label>
        <input type="text" name="name" value="{{ form.name.value|default:'' }}"
               class="input input-bordered w-full input-sm" required
               placeholder="Недозвон, Срочно, Завис…">
      </div>

      <div>
        <label class="label py-1">
          <span class="label-text">Цвет (класс daisyUI)</span>
        </label>
        <input type="text" name="color" value="{{ form.color.value|default:'' }}"
               class="input input-bordered w-full input-sm"
               placeholder="badge-warning / badge-error / badge-info / badge-success">
        <p class="text-xs text-base-content/60 mt-1">
          Примеры: <code>badge-warning</code>, <code>badge-error</code>,
          <code>badge-info</code>, <code>badge-success</code>, <code>badge-neutral</code>
        </p>
      </div>

      <div>
        <label class="label cursor-pointer justify-start gap-2">
          <input type="checkbox" name="is_active" class="checkbox checkbox-sm"
                 {% if form.is_active.value %}checked{% endif %}>
          <span class="label-text">Активен</span>
        </label>
      </div>

      {% if form.non_field_errors %}
        <div class="alert alert-error text-sm">{{ form.non_field_errors }}</div>
      {% endif %}

      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
        <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>

<script>
  document.querySelectorAll('#tag-modal select').forEach(el => {
    el.classList.add('select','select-bordered','select-sm','w-full');
  });
</script>
