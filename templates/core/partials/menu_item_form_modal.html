<dialog id="menuitem-modal" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-lg">
    <h3 class="font-bold text-lg mb-4">
      {% if item %}Редактирование: {{ item.name }}{% else %}Новый пункт меню{% endif %}
    </h3>
    <form hx-post="{% if item %}{% url 'core:admin_menu_item_edit' item.pk %}{% else %}{% url 'core:admin_menu_item_add' %}{% endif %}"
          hx-target="#menuitem-modal" hx-swap="outerHTML"
          class="space-y-3">
      {% csrf_token %}

      <div class="grid grid-cols-3 gap-3">
        <div class="col-span-2">
          <label class="label"><span class="label-text">Название</span></label>
          <input type="text" name="name" value="{{ form.name.value|default:'' }}"
                 class="input input-bordered w-full input-sm" required>
        </div>
        <div>
          <label class="label"><span class="label-text">Иконка</span></label>
          <input type="text" name="icon" value="{{ form.icon.value|default:'' }}"
                 class="input input-bordered w-full input-sm" maxlength="10">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label"><span class="label-text">URL</span></label>
          <input type="text" name="url" value="{{ form.url.value|default:'' }}"
                 class="input input-bordered w-full input-sm" required>
        </div>
        <div>
          <label class="label"><span class="label-text">Секция</span></label>
          <input type="text" name="section" value="{{ form.section.value|default:'' }}"
                 class="input input-bordered w-full input-sm" placeholder="CRM, Администрирование...">
        </div>
      </div>

      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="label"><span class="label-text">Порядок</span></label>
          <input type="number" name="order" value="{{ form.order.value|default:'0' }}"
                 class="input input-bordered w-full input-sm" min="0">
        </div>
        <div class="flex items-end pb-1">
          <label class="label cursor-pointer gap-2">
            <span class="label-text">HTMX</span>
            <input type="checkbox" name="use_htmx"
                   {% if form.use_htmx.value %}checked{% endif %}
                   class="toggle toggle-sm">
          </label>
        </div>
        <div class="flex items-end pb-1">
          <label class="label cursor-pointer gap-2">
            <span class="label-text">Superuser</span>
            <input type="checkbox" name="requires_superuser"
                   {% if form.requires_superuser.value %}checked{% endif %}
                   class="toggle toggle-sm">
          </label>
        </div>
      </div>

      <div class="flex items-center">
        <label class="label cursor-pointer gap-2">
          <span class="label-text">Активен</span>
          <input type="checkbox" name="is_active"
                 {% if form.is_active.value %}checked{% endif %}
                 class="toggle toggle-primary toggle-sm">
        </label>
      </div>

      {% if form.errors %}
        <div class="alert alert-error text-sm">{{ form.errors }}</div>
      {% endif %}
      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
        <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>
