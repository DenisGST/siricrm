<dialog id="widget-modal" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-lg">
    <h3 class="font-bold text-lg mb-4">
      {% if widget %}Редактирование: {{ widget.name }}{% else %}Новый виджет{% endif %}
    </h3>
    <form hx-post="{% if widget %}{% url 'core:admin_widget_edit' widget.pk %}{% else %}{% url 'core:admin_widget_add' %}{% endif %}"
          hx-target="#widget-modal" hx-swap="outerHTML"
          class="space-y-3">
      {% csrf_token %}

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label"><span class="label-text">Название</span></label>
          <input type="text" name="name" value="{{ form.name.value|default:'' }}"
                 class="input input-bordered w-full input-sm" required>
        </div>
        <div>
          <label class="label"><span class="label-text">Slug</span></label>
          <input type="text" name="slug" value="{{ form.slug.value|default:'' }}"
                 class="input input-bordered w-full input-sm" required>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label"><span class="label-text">Тип</span></label>
          <select name="widget_type" class="select select-bordered w-full select-sm">
            {% for val, label in form.fields.widget_type.choices %}
              <option value="{{ val }}" {% if form.widget_type.value == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="label"><span class="label-text">Порядок</span></label>
          <input type="number" name="order" value="{{ form.order.value|default:'0' }}"
                 class="input input-bordered w-full input-sm" min="0">
        </div>
      </div>

      <div>
        <label class="label"><span class="label-text">Шаблон</span></label>
        <input type="text" name="template_name" value="{{ form.template_name.value|default:'' }}"
               class="input input-bordered w-full input-sm" placeholder="core/widgets/my_widget.html">
      </div>

      <div>
        <label class="label"><span class="label-text">Описание</span></label>
        <textarea name="description" rows="2"
                  class="textarea textarea-bordered w-full textarea-sm">{{ form.description.value|default:'' }}</textarea>
      </div>

      <div class="flex items-center">
        <label class="label cursor-pointer gap-2">
          <span class="label-text">Активен</span>
          <input type="checkbox" name="is_active"
                 {% if form.is_active.value %}checked{% endif %}
                 class="toggle toggle-primary toggle-sm">
        </label>
      </div>

      {% if form.errors %}
        <div class="alert alert-error text-sm">{{ form.errors }}</div>
      {% endif %}
      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
        <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>
