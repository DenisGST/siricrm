<dialog id="emp-modal" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-lg">
    <h3 class="font-bold text-lg mb-4">
      Настройки: {{ emp.user.get_full_name }}
    </h3>
    <form hx-post="{% url 'core:admin_employee_edit' emp.pk %}"
          hx-target="#emp-modal" hx-swap="outerHTML"
          class="space-y-3">
      {% csrf_token %}

      <div>
        <label class="label"><span class="label-text">Отдел</span></label>
        <select name="department" class="select select-bordered w-full select-sm">
          <option value="">— Не назначен —</option>
          {% for val, label in form.fields.department.choices %}
            {% if val %}
            <option value="{{ val }}" {% if form.department.value|stringformat:"s" == val|stringformat:"s" %}selected{% endif %}>{{ label }}</option>
            {% endif %}
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="label"><span class="label-text">Роль</span></label>
        <select name="role" class="select select-bordered w-full select-sm">
          {% for val, label in form.fields.role.choices %}
            <option value="{{ val }}" {% if form.role.value == val %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="label"><span class="label-text">Конфигурация дашборда</span></label>
        <select name="dashboard_config" class="select select-bordered w-full select-sm">
          <option value="">— По умолчанию —</option>
          {% for val, label in form.fields.dashboard_config.choices %}
            {% if val %}
            <option value="{{ val }}" {% if form.dashboard_config.value|stringformat:"s" == val|stringformat:"s" %}selected{% endif %}>{{ label }}</option>
            {% endif %}
          {% endfor %}
        </select>
      </div>

      <div class="flex items-center gap-3">
        <label class="label cursor-pointer gap-2">
          <span class="label-text">Доступ к мессенджеру</span>
          <input type="checkbox" name="has_messenger_access"
                 {% if form.has_messenger_access.value %}checked{% endif %}
                 class="toggle toggle-primary toggle-sm">
        </label>
      </div>

      <div class="flex items-center gap-3">
        <label class="label cursor-pointer gap-2">
          <span class="label-text">Активен</span>
          <input type="checkbox" name="is_active"
                 {% if form.is_active.value %}checked{% endif %}
                 class="toggle toggle-primary toggle-sm">
        </label>
      </div>

      {% if form.errors %}
        <div class="alert alert-error text-sm">{{ form.errors }}</div>
      {% endif %}
      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
        <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>
