<dialog id="region-modal" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-2xl">
    <h3 class="font-bold text-lg mb-4">
      {% if region %}Редактирование региона{% else %}Новый регион{% endif %}
    </h3>
    <form hx-post="{% if region %}{% url 'core:reference_region_edit' region.pk %}{% else %}{% url 'core:reference_region_add' %}{% endif %}"
          hx-target="#region-modal" hx-swap="outerHTML"
          class="space-y-3">
      {% csrf_token %}

      <div class="grid grid-cols-3 gap-3">
        <div class="col-span-1">
          <label class="label py-1"><span class="label-text">Номер</span></label>
          <input type="number" name="number" value="{{ form.number.value|default:'' }}"
                 class="input input-bordered w-full input-sm" required>
          {% if form.number.errors %}<span class="text-error text-xs">{{ form.number.errors.0 }}</span>{% endif %}
        </div>
        <div class="col-span-2">
          <label class="label py-1"><span class="label-text">Название</span></label>
          <input type="text" name="name" value="{{ form.name.value|default:'' }}"
                 class="input input-bordered w-full input-sm" required>
          {% if form.name.errors %}<span class="text-error text-xs">{{ form.name.errors.0 }}</span>{% endif %}
        </div>
      </div>

      <div>
        <label class="label py-1"><span class="label-text">Наименование суда</span></label>
        <input type="text" name="court_name" value="{{ form.court_name.value|default:'' }}"
               class="input input-bordered w-full input-sm">
      </div>

      <div>
        <label class="label py-1"><span class="label-text">Адрес суда</span></label>
        <textarea name="court_address" rows="2"
                  class="textarea textarea-bordered textarea-sm w-full">{{ form.court_address.value|default:'' }}</textarea>
      </div>

      <div>
        <label class="label py-1"><span class="label-text">Реквизиты для госпошлины</span></label>
        <textarea name="court_payment_details" rows="4"
                  class="textarea textarea-bordered textarea-sm w-full">{{ form.court_payment_details.value|default:'' }}</textarea>
      </div>

      {% if form.non_field_errors %}
        <div class="alert alert-error text-sm">{{ form.non_field_errors }}</div>
      {% endif %}

      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
        <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>
