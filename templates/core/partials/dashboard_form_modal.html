<dialog id="dashboard-cfg-modal" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-2xl">
    <h3 class="font-bold text-lg mb-4">
      {% if config %}Редактирование: {{ config.name }}{% else %}Новая конфигурация{% endif %}
    </h3>
    <form hx-post="{% if config %}{% url 'core:admin_dashboard_edit' config.pk %}{% else %}{% url 'core:admin_dashboard_add' %}{% endif %}"
          hx-target="#dashboard-cfg-modal" hx-swap="outerHTML"
          class="space-y-3">
      {% csrf_token %}

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label"><span class="label-text">Название</span></label>
          <input type="text" name="name" value="{{ form.name.value|default:'' }}"
                 class="input input-bordered w-full input-sm" required>
        </div>
        <div class="flex items-end gap-4 pb-1">
          <label class="label cursor-pointer gap-2">
            <span class="label-text">По умолчанию</span>
            <input type="checkbox" name="is_default"
                   {% if form.is_default.value %}checked{% endif %}
                   class="toggle toggle-primary toggle-sm">
          </label>
          <label class="label cursor-pointer gap-2">
            <span class="label-text">Активен</span>
            <input type="checkbox" name="is_active"
                   {% if form.is_active.value %}checked{% endif %}
                   class="toggle toggle-primary toggle-sm">
          </label>
        </div>
      </div>

      <div>
        <label class="label"><span class="label-text">Описание</span></label>
        <textarea name="description" rows="2"
                  class="textarea textarea-bordered w-full textarea-sm">{{ form.description.value|default:'' }}</textarea>
      </div>

      <div class="divider text-xs">Пункты меню</div>
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-1 max-h-48 overflow-y-auto">
        {% for checkbox in form.menu_items %}
          <label class="label cursor-pointer justify-start gap-2 p-1">
            {{ checkbox.tag }}
            <span class="label-text text-xs">{{ checkbox.choice_label }}</span>
          </label>
        {% endfor %}
      </div>

      <div class="divider text-xs">Виджеты</div>
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-1 max-h-48 overflow-y-auto">
        {% for checkbox in form.widgets %}
          <label class="label cursor-pointer justify-start gap-2 p-1">
            {{ checkbox.tag }}
            <span class="label-text text-xs">{{ checkbox.choice_label }}</span>
          </label>
        {% endfor %}
      </div>

      {% if form.errors %}
        <div class="alert alert-error text-sm">{{ form.errors }}</div>
      {% endif %}
      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
        <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>
