<div id="payment-procedures-list"
     hx-trigger="reloadPaymentProcedures from:body"
     hx-get="{% url 'core:references_payment_procedures' %}"
     hx-swap="outerHTML">

  <div class="flex justify-between items-center mb-3">
    <h3 class="font-semibold">Порядок оплаты ({{ items|length }})</h3>
    <button class="btn btn-primary btn-sm"
            hx-get="{% url 'core:reference_payment_procedure_add' %}"
            hx-target="body" hx-swap="beforeend">
      + Добавить
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="table table-sm table-zebra">
      <thead>
        <tr>
          <th>Сокращение</th>
          <th>Полное наименование</th>
          <th>Описание</th>
          <th>Статус</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for it in items %}
        <tr>
          <td><span class="badge badge-outline">{{ it.short_name }}</span></td>
          <td>{{ it.full_name }}</td>
          <td class="text-xs text-base-content/70 max-w-xs truncate" title="{{ it.description }}">{{ it.description|default:"—" }}</td>
          <td>
            {% if it.is_active %}
              <span class="badge badge-success badge-xs">активен</span>
            {% else %}
              <span class="badge badge-ghost badge-xs">неактивен</span>
            {% endif %}
          </td>
          <td class="text-right">
            <button class="btn btn-xs btn-outline"
                    hx-get="{% url 'core:reference_payment_procedure_edit' it.pk %}"
                    hx-target="body" hx-swap="beforeend">Изменить</button>
            <button class="btn btn-xs btn-error btn-outline"
                    hx-post="{% url 'core:reference_payment_procedure_delete' it.pk %}"
                    hx-confirm="Удалить «{{ it.short_name }}»?">Удалить</button>
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="text-center text-base-content/60">Записей нет</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
