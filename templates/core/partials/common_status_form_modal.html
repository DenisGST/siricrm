<dialog id="common-status-modal" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-lg">
    <h3 class="font-bold text-lg mb-4">
      {% if obj %}Редактирование общего статуса{% else %}Новый общий статус{% endif %}
    </h3>
    <form hx-post="{% if obj %}{% url 'core:reference_common_status_edit' obj.pk %}{% else %}{% url 'core:reference_common_status_add' %}{% endif %}"
          hx-target="#common-status-modal" hx-swap="outerHTML"
          class="space-y-3">
      {% csrf_token %}

      <div>
        <label class="label py-1"><span class="label-text">Услуга</span></label>
        {{ form.service_name }}
        {% if form.service_name.errors %}<span class="text-error text-xs">{{ form.service_name.errors.0 }}</span>{% endif %}
      </div>

      <div>
        <label class="label py-1"><span class="label-text">Наименование статуса</span></label>
        <input type="text" name="name" value="{{ form.name.value|default:'' }}"
               class="input input-bordered w-full input-sm" required>
      </div>

      <div>
        <label class="label py-1"><span class="label-text">Порядок (сортировка колонок канбана)</span></label>
        <input type="number" name="order" value="{{ form.order.value|default:0 }}"
               class="input input-bordered w-full input-sm">
      </div>

      <div>
        <label class="label cursor-pointer justify-start gap-2">
          <input type="checkbox" name="is_active" class="checkbox checkbox-sm"
                 {% if form.is_active.value %}checked{% endif %}>
          <span class="label-text">Активен</span>
        </label>
      </div>

      {% if form.non_field_errors %}
        <div class="alert alert-error text-sm">{{ form.non_field_errors }}</div>
      {% endif %}

      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
        <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>

<script>
  // Стилизуем ModelChoiceField <select> под daisyUI.
  document.querySelectorAll('#common-status-modal select').forEach(el => {
    el.classList.add('select','select-bordered','select-sm','w-full');
  });
</script>
