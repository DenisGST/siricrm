<div class="p-4">
  <h2 class="text-xl font-bold mb-4">📚 Справочники</h2>

  <div class="tabs tabs-boxed mb-4 flex-wrap">
    <a class="tab {% if active_tab == 'regions' %}tab-active{% endif %}"
       hx-get="{% url 'core:references_regions' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Регионы РФ</a>
    <a class="tab {% if active_tab == 'kinds' %}tab-active{% endif %}"
       hx-get="{% url 'core:references_kinds' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Типы юр. лиц</a>
    <a class="tab {% if active_tab == 'service_names' %}tab-active{% endif %}"
       hx-get="{% url 'core:references_service_names' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Услуги</a>
    <a class="tab {% if active_tab == 'payment_procedures' %}tab-active{% endif %}"
       hx-get="{% url 'core:references_payment_procedures' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Порядок оплаты</a>
    <a class="tab {% if active_tab == 'common_statuses' %}tab-active{% endif %}"
       hx-get="{% url 'core:references_common_statuses' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Общие статусы услуг</a>
    <a class="tab {% if active_tab == 'employee_statuses' %}tab-active{% endif %}"
       hx-get="{% url 'core:references_employee_statuses' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Статусы сотрудников</a>
    <a class="tab {% if active_tab == 'tags' %}tab-active{% endif %}"
       hx-get="{% url 'core:references_tags' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Теги сотрудников</a>
    <a class="tab {% if active_tab == 'consultation_results' %}tab-active{% endif %}"
       hx-get="{% url 'consultations:result_reference' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Итоги консультаций</a>
    <a class="tab {% if active_tab == 'questionnaires' %}tab-active{% endif %}"
       hx-get="{% url 'questionnaire:template_list' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Анкеты</a>
    <a class="tab {% if active_tab == 'expense_types' %}tab-active{% endif %}"
       hx-get="{% url 'finance:references_expense_types' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Типы расходов</a>
    <a class="tab {% if active_tab == 'income_types' %}tab-active{% endif %}"
       hx-get="{% url 'finance:references_income_types' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Типы доходов</a>
    <a class="tab {% if active_tab == 'incoming_accounts' %}tab-active{% endif %}"
       hx-get="{% url 'finance:references_incoming_accounts' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Кассы (приход)</a>
    <a class="tab {% if active_tab == 'outgoing_accounts' %}tab-active{% endif %}"
       hx-get="{% url 'finance:references_outgoing_accounts' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Кассы (расход)</a>
    <a class="tab {% if active_tab == 'message_templates' %}tab-active{% endif %}"
       hx-get="{% url 'core:references_message_templates' %}" hx-target="#ref-content" hx-swap="innerHTML"
       onclick="setRefTab(this)">Шаблоны сообщений</a>
  </div>

  <div id="ref-content"
       hx-get="{% url 'core:references_regions' %}"
       hx-trigger="load"
       hx-swap="innerHTML">
  </div>
</div>

<script>
function setRefTab(el) {
  el.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
  el.classList.add('tab-active');
}
</script>
