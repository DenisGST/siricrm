<label class="label py-1"><span class="label-text">Папка клиента</span></label>
<select name="folder_id" class="select select-bordered select-sm w-full" required>
  {% for f in folders %}
  <option value="{{ f.id }}" {% if f.id == default_folder_id %}selected{% endif %}>{{ f.indent }}{{ f.name }}</option>
  {% endfor %}
</select>

<label class="label py-1 mt-2"><span class="label-text">Имя файла</span></label>
<input type="text" name="name" value="{{ scan.filename|default:'' }}"
       class="input input-bordered input-sm w-full" placeholder="Имя файла">

<div class="divider my-2"></div>

<label class="label cursor-pointer justify-start gap-2 py-1">
  <input type="checkbox" name="make_correspondence" class="checkbox checkbox-sm"
         onchange="document.getElementById('scan-corr-fields').classList.toggle('hidden', !this.checked)">
  <span class="label-text">Завести запись входящей корреспонденции</span>
</label>

<div id="scan-corr-fields" class="hidden mt-1 pl-1 border-l-2 border-base-300">
  {% if services %}
  <label class="label py-1"><span class="label-text">Услуга (по которой переписка)</span></label>
  <select name="service_id" class="select select-bordered select-sm w-full">
    {% for s in services %}
    <option value="{{ s.id }}">{{ s.name }}{% if s.numb_dogovor %} · № {{ s.numb_dogovor }}{% endif %}</option>
    {% endfor %}
  </select>
  {% else %}
  <div class="alert alert-warning text-xs py-1 px-2">
    У клиента нет услуг — корреспонденцию привязать не к чему. Снимите галочку.
  </div>
  {% endif %}

  <label class="label py-1 mt-1"><span class="label-text">Контрагент (от кого письмо)</span></label>
  <select name="counterparty_id" class="select select-bordered select-sm w-full">
    <option value="">— не указан —</option>
    {% for le in counterparties %}
    <option value="{{ le.id }}">{{ le.name }}</option>
    {% endfor %}
  </select>

  <label class="label py-1 mt-1"><span class="label-text">Тип письма</span></label>
  <input type="text" name="subject_type" class="input input-bordered input-sm w-full"
         placeholder="Например, «Ответ из Росреестра»">

  <label class="label py-1 mt-1"><span class="label-text">Дата документа</span></label>
  <input type="date" name="doc_date" class="input input-bordered input-sm w-full">
</div>
