{% if query|length >= 2 %}
  {% if items %}
    <ul class="menu bg-base-100 border border-base-300 rounded-box shadow-lg max-h-48 overflow-y-auto p-1">
      {% for le in items %}
      <li><a class="text-sm" onclick="window.pickScanCounterparty('{{ le.id }}', '{{ le.name|escapejs }}')">{{ le.name }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <div class="text-xs text-base-content/60 p-2">Ничего не найдено</div>
  {% endif %}
{% else %}
  <div class="text-xs text-base-content/60 p-2">Введите 2 и более символов…</div>
{% endif %}
