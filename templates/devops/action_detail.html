{% extends "devops/_layout.html" %}
{% block title %}{{ action.get_action_type_display }} · DevOps{% endblock %}

{% block content %}
<div class="container mx-auto p-4 md:p-6 max-w-4xl space-y-4">
  <div class="flex items-center gap-3 flex-wrap">
    <a href="{% url 'devops:dashboard' %}" class="btn btn-sm btn-ghost">← К дашборду</a>
    <h1 class="text-xl font-bold flex items-center gap-2">
      {{ action.get_action_type_display }}
      <span class="badge {% if action.environment.name == 'prod' %}badge-error{% else %}badge-ghost{% endif %}">{{ action.environment.name }}</span>
    </h1>
  </div>

  {% include "devops/partials/action_card.html" %}
</div>
{% endblock %}
