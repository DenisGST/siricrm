{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DevOps · SiriCRM{% endblock %}</title>
  <link rel="icon" href="{% static 'img/favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <script src="https://unpkg.com/htmx.org@1.9.8"></script>
  <script>
    document.addEventListener('htmx:configRequest', (e) => {
      const t = document.cookie.split('; ').find(r => r.startsWith('csrftoken='))?.split('=')[1];
      if (t) e.detail.headers['X-CSRFToken'] = t;
    });
    // Модалка подтверждения опасного действия: разблокирует submit, когда введено
    // кодовое слово (и, если есть, отмечен чекбокс [data-gate]).
    function dgConfirm(id){
      const m = document.getElementById(id);
      if(!m) return;
      const inp = m.querySelector('input[name=confirm]');
      const gate = m.querySelector('[data-gate]');
      const btn = m.querySelector('button[type=submit]');
      function check(){
        const wordOk = inp.value.trim() === inp.dataset.word;
        const gateOk = !gate || gate.checked;
        btn.disabled = !(wordOk && gateOk);
      }
      inp.value=''; if(gate) gate.checked=false; check();
      inp.oninput = check; if(gate) gate.onchange = check;
      m.showModal();
      setTimeout(function(){ inp.focus(); }, 60);
    }
  </script>
</head>
<body class="min-h-screen bg-base-200">
  <div class="navbar bg-base-100 shadow-sm sticky top-0 z-30">
    <div class="container mx-auto max-w-6xl">
      <a href="/dashboard/" class="btn btn-ghost text-lg">← SiriCRM</a>
      <span class="ml-4 font-semibold">🛠 DevOps Panel</span>
      <div class="ml-auto text-sm opacity-60">{{ request.user.username }}</div>
    </div>
  </div>
  {% block content %}{% endblock %}
</body>
</html>
