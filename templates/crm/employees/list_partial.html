<div class="flex flex-col gap-3">

  {# ── Строка поиска (остаётся на месте, не заменяется) ── #}
  <div class="flex items-center gap-2">
    <input
      id="emp-search-input"
      type="text"
      name="search"
      value="{{ search }}"
      placeholder="🔎 Имя, фамилия, отдел..."
      class="input input-sm input-bordered flex-1 max-w-xs"
      hx-get="/employees/?partial=1"
      hx-trigger="input changed delay:400ms, search"
      hx-target="#employees-results"
      hx-swap="innerHTML"
      hx-include="[name='search']"
      autocomplete="off"
    />
    {% if search %}
      <button class="btn btn-sm btn-ghost"
              hx-get="/employees/?partial=1&search="
              hx-target="#employees-results"
              hx-swap="innerHTML"
              onclick="document.getElementById('emp-search-input').value=''">
        ✕ Сбросить
      </button>
    {% endif %}
  </div>

  {# ── Результаты (заменяются при поиске) ── #}
  <div id="employees-results">
    {% include "crm/employees/list_results.html" %}
  </div>

</div>
