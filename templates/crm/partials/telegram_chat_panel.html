{% load static %}
<!-- /var/www/projects/siricrm/templates/crm/partials/telegram_chat_panel.html -->
<div id="telegram-chat-panel-root" class="relative flex flex-col h-full">
  <!-- шапка -->
  <div class="flex items-center justify-between border-b px-4 py-2 shrink-0">
    <div>
      <div class="font-semibold">
        {{ client.first_name }} {{ client.last_name }}
        {% if client.username %}
          <span class="text-gray-400 text-sm">@{{ client.username }}</span>
        {% endif %}
      </div>
      {% if client.phone %}
        <div class="text-xs text-gray-500">
          {{ client.phone }}
        </div>
      {% endif %}
    </div>

    <div class="flex items-center gap-2">
      <button
        id="btn-import-history"
        onclick="startImportHistory('{{ client.id }}')"
        class="btn btn-ghost btn-xs text-gray-400 hover:text-primary"
        title="Импорт истории из Telegram"
      >
        История
      </button>
    </div>
  </div>

  <!-- список сообщений -->
  <div
    id="telegram-messages-container"
    class="flex-1 overflow-y-auto bg-gray-50 px-4 py-3"
  >
    <div
      id="messages-loader"
      class="hidden text-center py-3"
    >
      <svg
        class="animate-spin h-8 w-8 mx-auto text-primary"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0
             0 5.373 0 12h4z"
        ></path>
      </svg>
    </div>

    <div
      id="telegram-messages-list"
      class="space-y-2"
      data-client-id="{{ client.id }}"
      data-prev-page="{% if page_obj.has_previous %}{{ page_obj.previous_page_number }}{% endif %}"
    >
      {% include "crm/partials/telegram_messages_list.html" with messages=messages %}
    </div>
  </div>

  <!-- форма отправки -->
  <div class="border-t px-4 py-2 shrink-0">
    <form
      id="telegram-send-form"
      class="space-y-2"
      enctype="multipart/form-data"
    >
      <textarea
        name="content"
        rows="1"
        class="w-full textarea textarea-bordered resize-none"
        placeholder="Напишите сообщение..."
      ></textarea>

      <div class="flex items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <label class="btn btn-ghost btn-xs">
            <input type="file" name="file" class="hidden">
            📎
          </label>
          <button type="button" id="btn-record" class="btn btn-ghost btn-xs">🎙</button>
          <button type="button" id="btn-stop" class="btn btn-ghost btn-xs hidden">⏹</button>
          <button type="button" id="btn-cancel" class="btn btn-ghost btn-xs hidden">Отмена</button>
        </div>

        <button
          type="submit"
          id="btn-send-telegram"
          class="btn btn-primary btn-sm"
          hx-post="{% url 'telegram_send_message' client.id %}"
          hx-encoding="multipart/form-data"
          hx-swap="none"
        >
          Telegram
        </button>
        <button
          type="submit"
          id="btn-send-max"
          class="btn btn-sm"
          style="background-color:#ec4899;border-color:#ec4899;color:white;"
          hx-post="{% url 'max_send_message' client.id %}"
          hx-encoding="multipart/form-data"
          hx-swap="none"
        >
          MAX
        </button>

      </div>

      <div id="telegram-file-preview" class="text-xs text-gray-500"></div>
    </form>
  </div>

  <!-- WebSocket для чата -->
  <div
    id="telegram-chat-ws"
    hx-ext="ws"
    ws-connect="wss://siricrm.ru/ws/telegram/client/{{ client.id }}/"
  ></div>

  <audio id="incoming-sound" src="{% static 'sounds/incoming.mp3' %}" preload="auto"></audio>
</div>

<script>
  (function () {
    var container = document.getElementById("telegram-messages-container");
    var list = document.getElementById("telegram-messages-list");
    if (!container || !list) return;

    var btnCancel = document.getElementById("btn-cancel");
    var filePreview = document.getElementById("telegram-file-preview");
    var sendForm = document.getElementById("telegram-send-form");
    var currentMode = null; // 'file' | 'voice' | null

    function showCancelIfNeeded() {
      if (!btnCancel) return;
      if (currentMode) {
        btnCancel.classList.remove("hidden");
      } else {
        btnCancel.classList.add("hidden");
      }
    }

    function clearVoiceInputs() {
      if (!sendForm) return;
      var extraInputs = sendForm.querySelectorAll('input[name="file"].voice-generated');
      extraInputs.forEach(function (inp) {
        inp.remove();
      });
    }

    function scrollBottom() {
      if (!container) return;
      container.scrollTop = container.scrollHeight;
    }
    setTimeout(function () {
      scrollBottom();
      window.crmScrollBottom = scrollBottom;
    }, 300);

    var loading = false;
    var scrollReady = false;

    setTimeout(function () {
      scrollReady = true;
    }, 300);

    container.addEventListener(
      "scroll",
      async function () {
        if (!scrollReady) return;
        if (loading) return;
        if (container.scrollTop > 0) return;

        var prevPage = list.dataset.prevPage;
        if (!prevPage) return;

        loading = true;
        var loader = document.getElementById("messages-loader");
        if (loader) loader.classList.remove("hidden");

        var url = "{% url 'telegram_chat_for_client' client.id %}?page=" + prevPage;

        try {
          var resp = await fetch(url, { headers: { "HX-Request": "true" } });
          if (!resp.ok) {
            loading = false;
            return;
          }
          var html = await resp.text();
          var oldH = container.scrollHeight;

          var tmp = document.createElement("div");
          tmp.innerHTML = html;
          while (tmp.lastChild) {
            list.insertBefore(tmp.lastChild, list.firstChild);
          }

          container.scrollTop = container.scrollHeight - oldH;

          var newPrevPage = parseInt(prevPage) - 1;
          list.dataset.prevPage = newPrevPage > 1 ? newPrevPage.toString() : "";
        } catch (e) {
          console.error("scroll-up error", e);
        } finally {
          if (loader) loader.classList.add("hidden");
          setTimeout(function () {
            loading = false;
          }, 200);
        }
      },
      { passive: true }
    );

    document.addEventListener("htmx:afterRequest", function (e) {
        const btn = e.detail.elt;
        if ((btn.id === "btn-send-telegram" || btn.id === "btn-send-max") && e.detail.successful) {
            const html = e.detail.xhr.responseText;
            if (html && html.trim()) {
                list.insertAdjacentHTML("beforeend", html);
                setTimeout(scrollBottom, 50);
            }
            document.getElementById("telegram-send-form")?.reset();
            if (filePreview) filePreview.innerHTML = "";
            clearVoiceInputs();
            currentMode = null;
            showCancelIfNeeded();
        }
    });

    document.addEventListener("htmx:afterSwap", function (e) {
      if (e.detail.target && e.detail.target.id === "telegram-chat-panel-root") {
        setTimeout(scrollBottom, 50);
      }
    });

    document.addEventListener("change", function (e) {
      if (e.target.name !== "file") return;
      if (filePreview) filePreview.innerHTML = "";
      var file = e.target.files[0];
      if (file && filePreview) {
        filePreview.textContent = file.name;
        currentMode = "file";
      } else {
        currentMode = null;
      }
      showCancelIfNeeded();
    });

    var rec, chunks;
    document.getElementById("btn-record")?.addEventListener("click", async function () {
      try {
        var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        rec = new MediaRecorder(stream, { mimeType: "audio/webm;codecs=opus" });
        rec.ondataavailable = function (e) {
          chunks.push(e.data);
        };
        rec.onstop = function () {
          stream.getTracks().forEach(function (t) {
            t.stop();
          });

          var blob = new Blob(chunks, { type: "audio/ogg;codecs=opus" });
          var f = new File([blob], "voice.ogg", { type: "audio/ogg" });
          var dt = new DataTransfer();
          dt.items.add(f);

          var inp = document.createElement("input");
          inp.type = "file";
          inp.name = "file";
          inp.classList.add("voice-generated");
          inp.style.display = "none";
          inp.files = dt.files;
          sendForm.appendChild(inp);

          if (filePreview) {
            filePreview.innerHTML = "";
            var a = document.createElement("audio");
            a.controls = true;
            a.src = URL.createObjectURL(blob);
            filePreview.appendChild(a);
          }
          currentMode = "voice";
          showCancelIfNeeded();
        };

        rec.start();
        document.getElementById("btn-record").classList.add("hidden");
        document.getElementById("btn-stop").classList.remove("hidden");
      } catch (err) {
        alert(err.message);
      }
    });

    document.getElementById("btn-stop")?.addEventListener("click", function () {
      if (rec) rec.stop();
      document.getElementById("btn-stop").classList.add("hidden");
      document.getElementById("btn-record").classList.remove("hidden");
    });

    btnCancel?.addEventListener("click", function () {
      if (currentMode === "file") {
        var realFileInput = sendForm.querySelector('label input[name="file"]');
        if (realFileInput) realFileInput.value = "";
      }
      if (currentMode === "voice") {
        if (rec && rec.state === "recording") rec.stop();
        clearVoiceInputs();
      }
      if (filePreview) filePreview.innerHTML = "";
      currentMode = null;
      showCancelIfNeeded();
      setTimeout(scrollBottom, 100);
    });

    function playIncomingSound() {
      const audio = document.getElementById("incoming-sound");
      if (!audio) return;
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function isNearBottom(container) {
      if (!container) return false;
      const threshold = 200;
      return container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
    }

    window.crmIsNearBottom = isNearBottom;

    function scrollTelegramChatBottomIfVisibleForClient(clientId) {
      const list = document.getElementById("telegram-messages-list");
      const container = document.getElementById("telegram-messages-container");
      if (!list || !container) return;

      const currentClientId = list.dataset.clientId;
      if (String(currentClientId) !== String(clientId)) return;
      if (!isNearBottom(container)) return;

      setTimeout(function () {
        container.scrollTop = container.scrollHeight;
      }, 50);
    }

    document.body.addEventListener("htmx:wsAfterMessage", function (evt) {
        let data;
        try { data = JSON.parse(evt.detail.message); } catch(e) { return; }
        if (!data || data.type !== "chat_message_status") return;

        const el = document.querySelector('[data-msg-id="' + data.message_id + '"]');
        if (!el) return;

        const badge = el.querySelector(".msg-status");
        if (!badge) return;

        if (data.is_sent) {
            badge.textContent = "✓";
            badge.classList.remove("text-gray-400", "animate-pulse");
            badge.classList.add("text-green-500");
            badge.title = "Отправлено";
        }
    });

  })();
</script>
