<div id="telegram-chat-panel-root" class="flex flex-col h-full">
  <!-- Заголовок -->
  <div class="flex items-center justify-between border-b px-4 py-2 shrink-0">
    <div>
      <div class="font-semibold">
        {{ client.first_name }} {{ client.last_name }}
        {% if client.username %}
          <span class="text-gray-400 text-sm">@{{ client.username }}</span>
        {% endif %}
      </div>
      {% if client.phone %}<div class="text-xs text-gray-500">{{ client.phone }}</div>{% endif %}
    </div>
  </div>

  <!-- Сообщения -->
  <div id="telegram-messages-container" class="flex-1 overflow-y-auto bg-gray-50 px-4 py-3">
    <!-- Спиннер загрузки старых сообщений -->
    <div id="messages-loader" class="hidden text-center py-3">
      <svg class="animate-spin h-8 w-8 mx-auto text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>

    <div id="telegram-messages-list"
         class="space-y-2"
         data-client-id="{{ client.id }}"
         data-prev-page="{% if page_obj.has_previous %}{{ page_obj.previous_page_number }}{% endif %}"
    >
      {% include "crm/partials/telegram_messages_list.html" with messages=messages %}
    </div>
  </div>
  
  <!-- Форма -->
  <div class="border-t px-4 py-2 shrink-0">
    <form
      id="telegram-send-form"
      class="space-y-2"
      enctype="multipart/form-data"
      hx-post="{% url 'telegram_send_message' client.id %}"
      hx-target="#telegram-messages-list"
      hx-swap="beforeend"
    >
      <textarea name="content" rows="1" class="w-full textarea textarea-bordered resize-none" placeholder="Напишите сообщение..."></textarea>
      <div class="flex items-center justify-between gap-2">
        <div class="flex items-center gap-2">
          <label class="btn btn-ghost btn-xs">📎<input type="file" name="file" class="hidden"></label>
          <button type="button" id="btn-record" class="btn btn-ghost btn-xs">🎙</button>
          <button type="button" id="btn-stop" class="btn btn-ghost btn-xs hidden">⏹</button>
          <button type="button" id="btn-cancel" class="btn btn-ghost btn-xs hidden">❌</button>
          <div id="telegram-file-preview" class="text-xs text-gray-500"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Отправить</button>
      </div>
    </form>
  </div>
  <div
    id="telegram-chat-ws"
    hx-ext="ws"
    ws-connect="/ws/telegram/client/{{ client.id }}/">
  </div>
</div>


<audio id="incoming-sound" src="/static/sounds/incoming.mp3" preload="auto"></audio>

<script>
(function () {
  var container = document.getElementById("telegram-messages-container");
  var list = document.getElementById("telegram-messages-list");
  if (!container || !list) return;

  // --- общие элементы для отмены ---
  var btnCancel = document.getElementById("btn-cancel");
  var filePreview = document.getElementById("telegram-file-preview");
  var sendForm = document.getElementById("telegram-send-form");
  var currentMode = null; // 'file' | 'voice' | null

  function showCancelIfNeeded() {
    if (!btnCancel) return;
    if (currentMode) {
      btnCancel.classList.remove("hidden");
    } else {
      btnCancel.classList.add("hidden");
    }
  }

  function clearVoiceInputs() {
    if (!sendForm) return;
    // удаляем все динамически добавленные input[name="file"] для голоса
    var extraInputs = sendForm.querySelectorAll('input[name="file"].voice-generated');
    extraInputs.forEach(function (inp) { inp.remove(); });
  }

  // ── Скролл вниз ─────────────────────────────────────────────────────────
  function scrollBottom() {
    container.scrollTop = container.scrollHeight;
    setTimeout(function () { scrollReady = true; }, 300);
  }
  window.crmScrollBottom = scrollBottom;  // чтобы дергать снаружи

  var loading = false;
  var scrollReady = false;

  // ── Подгрузка старых сообщений при скролле вверх ────────────────────────
  container.addEventListener("scroll", async function () {
    if (!scrollReady) return;
    if (loading) return;
    if (container.scrollTop > 0) return;

    var prevPage = list.dataset.prevPage;
    if (!prevPage) return;

    loading = true;
    var loader = document.getElementById("messages-loader");
    if (loader) loader.classList.remove("hidden");

    var clientId = list.dataset.clientId;
    var url = "/telegram/chat/" + clientId + "/?page=" + prevPage;

    try {
      var resp = await fetch(url, { headers: { "HX-Request": "true" } });
      if (!resp.ok) { loading = false; return; }

      var html = await resp.text();
      var oldH = container.scrollHeight;

      var tmp = document.createElement("div");
      tmp.innerHTML = html;
      while (tmp.lastChild) {
        list.insertBefore(tmp.lastChild, list.firstChild);
      }

      container.scrollTop = container.scrollHeight - oldH;

      var newPrevPage = parseInt(prevPage) - 1;
      list.dataset.prevPage = newPrevPage < 1 ? "" : newPrevPage.toString();
    } catch (e) {
      console.error("scroll-up error", e);
    } finally {
      if (loader) loader.classList.add("hidden");
      setTimeout(function () { loading = false; }, 200);
    }
  }, { passive: true });

  // ── После отправки: скролл вниз + очистка формы ─────────────────────────
  document.addEventListener("htmx:afterRequest", function (e) {
    if (e.detail.elt && e.detail.elt.id === "telegram-send-form" && e.detail.successful) {
      e.detail.elt.reset();
      if (filePreview) filePreview.innerHTML = "";
      clearVoiceInputs();
      currentMode = null;
      showCancelIfNeeded();
      setTimeout(scrollBottom, 50);
    }
  });

  // ── При смене клиента (панель заменяется) ───────────────────────────────
  document.addEventListener("htmx:afterSwap", function (e) {
    if (e.detail.target && e.detail.target.id === "telegram-chat-panel-root") {
      setTimeout(scrollBottom, 50);
    }
  });

  // ── Превью файла ────────────────────────────────────────────────────────
  document.addEventListener("change", function (e) {
    if (e.target.name !== "file") return;

    if (filePreview) filePreview.innerHTML = "";

    var file = e.target.files[0];
    if (file) {
      if (filePreview) filePreview.textContent = file.name;
      currentMode = "file";
    } else {
      currentMode = null;
    }
    showCancelIfNeeded();
  });

  // ── Запись голоса ───────────────────────────────────────────────────────
  var rec, chunks;
  document.getElementById("btn-record")?.addEventListener("click", async function () {
    try {
      var stream = await navigator.mediaDevices.getUserMedia({audio: true});
      chunks = [];
      rec = new MediaRecorder(stream, {mimeType: "audio/webm;codecs=opus"});
      rec.ondataavailable = function (e) { chunks.push(e.data); };
      rec.onstop = function () {
        stream.getTracks().forEach(function (t) { t.stop(); });
        var blob = new Blob(chunks, {type: "audio/ogg;codecs=opus"});
        var f = new File([blob], "voice.ogg", {type: "audio/ogg"});
        var dt = new DataTransfer(); dt.items.add(f);

        var inp = document.createElement("input");
        inp.type = "file";
        inp.name = "file";
        inp.classList.add("voice-generated"); // чтобы отличать от обычного файла
        inp.style.display = "none";
        inp.files = dt.files;
        sendForm.appendChild(inp);

        if (filePreview) {
          filePreview.innerHTML = "";
          var a = document.createElement("audio");
          a.controls = true;
          a.src = URL.createObjectURL(blob);
          filePreview.appendChild(a);
        }

        currentMode = "voice";
        showCancelIfNeeded();
      };
      rec.start();
      document.getElementById("btn-record").classList.add("hidden");
      document.getElementById("btn-stop").classList.remove("hidden");
      // cancel покажем после фактического появления превью/файла
    } catch (err) {
      alert("Микрофон: " + err.message);
    }
  });

  document.getElementById("btn-stop")?.addEventListener("click", function () {
    if (rec) rec.stop();
    document.getElementById("btn-stop").classList.add("hidden");
    document.getElementById("btn-record").classList.remove("hidden");
    // currentMode выставится в rec.onstop
  });

  // ── Кнопка отмены последнего действия (файл/голос) ─────────────────────
  btnCancel?.addEventListener("click", function () {
    if (currentMode === "file") {
      // сброс обычного выбранного файла
      var realFileInput = sendForm.querySelector('label input[name="file"]');
      if (realFileInput) realFileInput.value = "";
    }

    if (currentMode === "voice") {
      // остановка рекордера, если вдруг ещё пишет
      if (rec && rec.state === "recording") {
        rec.stop();
      }
      clearVoiceInputs();
    }

    if (filePreview) {
      filePreview.innerHTML = "";
    }

    currentMode = null;
    showCancelIfNeeded();
  });

  // ── Первый скролл вниз ──────────────────────────────────────────────────
  setTimeout(scrollBottom, 100);
})();

function playIncomingSound() {
  const audio = document.getElementById("incoming-sound");
  if (!audio) return;
  audio.currentTime = 0;
  audio.play().catch(() => {});
}

</script>


<script>
  function isNearBottom(container) {
    if (!container) return false;
    const threshold = 200; // px
    return (
      container.scrollHeight - container.scrollTop - container.clientHeight < threshold
    );
  }
  window.crmIsNearBottom = isNearBottom;


  function scrollTelegramChatBottomIfVisibleForClient(clientId) {
    const list = document.getElementById("telegram-messages-list");
    const container = document.getElementById("telegram-messages-container");
    if (!list || !container) return;

    const currentClientId = list.dataset.clientId;
    if (String(currentClientId) !== String(clientId)) return;

    if (!isNearBottom(container)) return;

    setTimeout(function () {
      container.scrollTop = container.scrollHeight;
    }, 50);
  }

  document.body.addEventListener("htmx:wsAfterMessage", function (event) {
    const data = event.detail?.message;
    if (!data) return;

    // автоскролл только для входящих сообщений, если открыт нужный клиент
    if (data.type === "chat_message") {
      scrollTelegramChatBottomIfVisibleForClient(data.client_id);
    }
  });
</script>
