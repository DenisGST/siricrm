<!--templates/crm/partials/telegram_clients_list.html-->

{# OOB: обновляем цифры в кнопках-фильтрах. Только на page=1 (на подгрузке цифры не меняются). #}
{% if counts %}
<span id="scope-count-mine" hx-swap-oob="true" class="ml-1 opacity-70">{{ counts.mine }}</span>
<span id="scope-count-dept" hx-swap-oob="true" class="ml-1 opacity-70">{{ counts.dept }}</span>
<span id="scope-count-all"  hx-swap-oob="true" class="ml-1 opacity-70">{{ counts.all }}</span>
{% endif %}

{% for client in page_obj %}
  <button
    class="tg-client-item w-full px-3 py-2 flex items-center gap-3 hover:bg-base-200 text-left border-l-2 border-transparent"
    data-client-id="{{ client.id }}"
    hx-get="{% url 'telegram_chat_for_client' client.id %}"
    hx-target="#telegram-chat-panel"
    hx-swap="innerHTML"
    onclick="setActiveTelegramClient(this)"
  >

    {% include "crm/partials/messenger_status_icon.html" with status=client.ms_status client_id=client.id place="list" initial=client.first_name|first %}
    <div class="flex-1 min-w-0">
      <div class="flex justify-between items-center">
        <span class="font-medium text-sm truncate">
          {{ client.last_name }} {{ client.first_name }}
          {% if client.patronymic %}<br><span class="text-xs opacity-60">{{ client.patronymic }}</span>{% endif %}
        </span>
        {% if client.last_message_at %}
          <span class="text-[10px] text-base-content/60">
            {{ client.last_message_at|date:"H:i" }}
          </span>
        {% endif %}
      </div>
      <div class="text-xs text-base-content/70 truncate">
        {% if client.username %}
          @{{ client.username }}
        {% elif client.phone %}
          {{ client.phone }}
        {% else %}
          Без контактов
        {% endif %}
      </div>
      <div class="flex items-center justify-between gap-2 mt-0.5">
        <span class="text-[10px] text-base-content/50 truncate">{{ client.get_status_display }}{% if client.region_label %} · {{ client.region_label }}{% endif %}</span>
        {% comment %}Значки каналов: цвет = были сообщения, серый = не было.
           Т — Telegram (синий), М — MAX (розовый), W — WhatsApp (зелёный).{% endcomment %}
        <span class="flex gap-1 flex-shrink-0" style="line-height:1">
          <span title="Telegram{% if not client.has_telegram %} — сообщений не было{% endif %}"
                style="display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:3px;font-size:9px;font-weight:700;line-height:1;background:transparent;border:1px solid {% if client.has_telegram %}#2563eb{% else %}#cbd5e1{% endif %};color:{% if client.has_telegram %}#2563eb{% else %}#cbd5e1{% endif %}">Т</span>
          <span title="MAX{% if not client.has_max %} — сообщений не было{% endif %}"
                style="display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:3px;font-size:9px;font-weight:700;line-height:1;background:transparent;border:1px solid {% if client.has_max %}#ec4899{% else %}#cbd5e1{% endif %};color:{% if client.has_max %}#ec4899{% else %}#cbd5e1{% endif %}">М</span>
          <span title="WhatsApp{% if not client.has_whatsapp %} — сообщений не было{% endif %}"
                style="display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:3px;font-size:9px;font-weight:700;line-height:1;background:transparent;border:1px solid {% if client.has_whatsapp %}#22c55e{% else %}#cbd5e1{% endif %};color:{% if client.has_whatsapp %}#22c55e{% else %}#cbd5e1{% endif %}">W</span>
        </span>
      </div>
    </div>
  </button>
{% empty %}
  <div class="px-3 py-2 text-xs text-base-content/60">
    Клиенты не найдены.
  </div>
{% endfor %}

{% if has_next %}
  <div
    class="w-full h-8 flex items-center justify-center text-[11px] text-base-content/60"
    hx-get="{% url 'telegram_clients_list' %}?page={{ next_page_number }}&scope={{ scope }}&sort={{ sort|urlencode }}&q={{ query|urlencode }}"
    hx-trigger="intersect once"
    hx-swap="outerHTML"
  >
    Загрузка ещё...
  </div>
{% endif %}
