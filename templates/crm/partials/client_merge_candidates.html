{# Кандидаты для объединения. Клик → загрузка таблицы сравнения в #merge-compare #}
{% if results %}
  <div class="flex flex-col gap-1">
    {% for c in results %}
    <button type="button"
            class="flex items-center justify-between border rounded-lg px-3 py-2 hover:bg-base-200 text-left w-full"
            hx-get="{% url 'client_merge_compare' client_id %}?other={{ c.id }}"
            hx-target="#merge-compare" hx-swap="innerHTML">
      <span class="flex flex-col">
        <span class="font-medium text-sm">{{ c.last_name }} {{ c.first_name }} {{ c.patronymic }}</span>
        <span class="flex items-center gap-2 text-xs text-base-content/50">
          {% if c.phone %}<span>📞 {{ c.phone }}</span>{% endif %}
          {% if c.username %}<span>@{{ c.username }}</span>{% endif %}
          {% if c.telegram_id %}<span class="badge badge-xs badge-info">TG</span>{% endif %}
          {% if c.max_chat_id %}<span class="badge badge-xs badge-warning">MAX</span>{% endif %}
        </span>
      </span>
      <span class="btn btn-xs btn-outline btn-primary">Сравнить →</span>
    </button>
    {% endfor %}
  </div>
{% elif q %}
  <p class="text-sm text-base-content/50 py-3">По запросу «{{ q }}» ничего не найдено.</p>
{% endif %}
