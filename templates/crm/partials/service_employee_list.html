{% load crm_tags %}
<div id="svc-emp-list-{{ service.pk }}" class="flex flex-wrap gap-1 items-center mb-1">
  {% for state in states %}
    <span class="badge badge-sm badge-ghost text-xs kanban-emp-badge cursor-pointer"
          title="{{ state.employee.user.get_full_name }}{% if state.status %} — {{ state.status.name }}{% endif %}"
          hx-get="{% url 'service_employee_picker' service.pk %}"
          hx-target="body"
          hx-swap="beforeend"
          onclick="event.stopPropagation()">
      {{ state.employee|short_name }}
    </span>
  {% empty %}
    <span class="text-xs text-base-content/40">исполнителей нет</span>
  {% endfor %}
  <button type="button"
          id="svc-emp-add-btn-{{ service.pk }}"
          class="kanban-action-btn text-base-content/40"
          title="Назначить исполнителей"
          hx-get="{% url 'service_employee_picker' service.pk %}"
          hx-target="body"
          hx-swap="beforeend"
          onclick="event.stopPropagation()">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <line x1="19" y1="8" x2="19" y2="14"/>
      <line x1="22" y1="11" x2="16" y2="11"/>
    </svg>
  </button>
</div>
