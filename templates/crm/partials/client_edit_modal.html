<!-- templates/crm/partials/client_edit_modal.html -->
<dialog id="client-edit-modal" class="modal modal-open">
  <div class="modal-box w-11/12 max-w-3xl">
    <h3 class="font-bold text-lg mb-4">Редактирование клиента</h3>

    <form
      hx-post="{% url 'client_edit' client.id %}"
      hx-target="#client-edit-modal"
      hx-swap="outerHTML"
      class="space-y-4"
    >
      {% csrf_token %}

      <!-- Основные данные -->
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="label"><span class="label-text">Фамилия</span></label>
          <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}"
            class="input input-bordered w-full input-sm">
        </div>
        <div>
          <label class="label"><span class="label-text">Имя</span></label>
          <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}"
            class="input input-bordered w-full input-sm" required>
        </div>
        <div>
          <label class="label"><span class="label-text">Отчество</span></label>
          <input type="text" name="patronymic" value="{{ form.patronymic.value|default:'' }}"
            class="input input-bordered w-full input-sm">
        </div>
      </div>

      <!-- Контакты -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label"><span class="label-text">Телефон</span></label>
          <input type="text" name="phone" value="{{ form.phone.value|default:'' }}"
            class="input input-bordered w-full input-sm">
        </div>
        <div>
          <label class="label"><span class="label-text">Email</span></label>
          <input type="email" name="email" value="{{ form.email.value|default:'' }}"
            class="input input-bordered w-full input-sm">
        </div>
        <div>
          <label class="label"><span class="label-text">Username</span></label>
          <input type="text" name="username" value="{{ form.username.value|default:'' }}"
            class="input input-bordered w-full input-sm">
        </div>
        <div>
          <label class="label"><span class="label-text">Статус</span></label>
          <select name="status" class="select select-bordered w-full select-sm">
            {% for val, label in form.fields.status.choices %}
              <option value="{{ val }}" {% if form.status.value == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Личные данные -->
      <div class="divider text-xs">Личные данные</div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label"><span class="label-text">Дата рождения</span></label>
          <input type="date" name="birth_date" value="{{ form.birth_date.value|default:'' }}"
            class="input input-bordered w-full input-sm">
        </div>
        <div>
          <label class="label"><span class="label-text">Место рождения</span></label>
          <input type="text" name="birth_place" value="{{ form.birth_place.value|default:'' }}"
            class="input input-bordered w-full input-sm">
        </div>
      </div>

      <!-- Паспорт -->
      <div class="divider text-xs">Паспорт</div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label"><span class="label-text">Серия</span></label>
          <input type="text" name="passport_series" value="{{ form.passport_series.value|default:'' }}"
            maxlength="4" placeholder="1234"
            class="input input-bordered w-full input-sm">
        </div>
        <div>
          <label class="label"><span class="label-text">Номер</span></label>
          <input type="text" name="passport_number" value="{{ form.passport_number.value|default:'' }}"
            maxlength="6" placeholder="567890"
            class="input input-bordered w-full input-sm">
        </div>
        <div class="col-span-2">
          <label class="label"><span class="label-text">Кем выдан</span></label>
          <input type="text" name="passport_issued_by" value="{{ form.passport_issued_by.value|default:'' }}"
            class="input input-bordered w-full input-sm">
        </div>
        <div>
          <label class="label"><span class="label-text">Дата выдачи</span></label>
          <input type="date" name="passport_issued_date" value="{{ form.passport_issued_date.value|default:'' }}"
            class="input input-bordered w-full input-sm">
        </div>
      </div>

      <!-- ИНН / СНИЛС -->
      <div class="divider text-xs">Документы</div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label"><span class="label-text">ИНН</span></label>
          <input type="text" name="inn" value="{{ form.inn.value|default:'' }}"
            maxlength="12" class="input input-bordered w-full input-sm">
        </div>
        <div>
          <label class="label"><span class="label-text">СНИЛС</span></label>
          <input type="text" name="snils" value="{{ form.snils.value|default:'' }}"
            maxlength="14" placeholder="000-000-000 00"
            class="input input-bordered w-full input-sm">
        </div>
      </div>

      <!-- Заметки -->
      <div>
        <label class="label"><span class="label-text">Заметки</span></label>
        <textarea name="notes" rows="2"
          class="textarea textarea-bordered w-full">{{ form.notes.value|default:'' }}</textarea>
      </div>

      <!-- Ошибки формы -->
      {% if form.errors %}
        <div class="alert alert-error text-sm">{{ form.errors }}</div>
      {% endif %}

      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Сохранить</button>
        <button type="button" class="btn btn-sm"
          onclick="document.getElementById('client-edit-modal').remove()">
          Отмена
        </button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="document.getElementById('client-edit-modal').remove()">close</button>
  </form>
</dialog>
