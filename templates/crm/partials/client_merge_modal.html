<!-- templates/crm/partials/client_merge_modal.html -->
<dialog id="client-merge-modal" class="modal modal-middle">
  <div class="modal-box w-full max-w-lg">
    <h3 class="font-bold text-lg mb-1">Объединить клиентов</h3>
    <p class="text-sm text-gray-500 mb-4">
      Найдите клиента-дубликата. Все его сообщения и данные будут перенесены в текущую карточку.
    </p>

    <!-- Поиск -->
    <input
      id="merge-search-input"
      type="text"
      placeholder="🔎 Имя, фамилия, телефон, username..."
      class="input input-sm input-bordered w-full mb-3"
      hx-get="/clients/merge-search/?source={{ client.id }}"
      hx-trigger="input changed delay:350ms, search"
      hx-target="#merge-search-results"
      hx-swap="innerHTML"
      hx-include="[name='merge_q']"
      name="merge_q"
      autocomplete="off"
    />

    <!-- Результаты -->
    <div id="merge-search-results" class="flex flex-col gap-2 min-h-[80px]">
      <p class="text-sm text-gray-400 text-center mt-6">Начните вводить имя клиента...</p>
    </div>

    <div class="modal-action mt-4">
      <button class="btn btn-sm btn-ghost" onclick="document.getElementById('client-merge-modal').close()">
        Отмена
      </button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
