{% load icons %}
<dialog id="finance-modal" class="modal modal-middle" open>
  <div class="modal-box w-full max-w-6xl">
    <div class="flex justify-between items-start mb-3">
      <div>
        <h3 class="font-bold text-lg">Финансы и расчёты</h3>
        <p class="text-sm text-base-content/60">
          {{ client.last_name }} {{ client.first_name }}{% if client.patronymic %} {{ client.patronymic }}{% endif %}
        </p>
      </div>
      <button type="button" class="btn btn-ghost btn-sm btn-circle"
              onclick="document.getElementById('finance-modal').remove()">
        {% icon "x" size=18 %}
      </button>
    </div>

    <div id="finance-content"
         hx-trigger="reloadFinance from:body"
         hx-get="{% url 'finance:finance_modal' client.id %}?partial=1"
         hx-include="#finance-filter-form"
         hx-swap="innerHTML">
      {% include "finance/partials/finance_table.html" %}
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="document.getElementById('finance-modal').remove()">close</button>
  </form>
</dialog>
