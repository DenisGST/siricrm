<dialog id="consult-move-dialog" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-md">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h3 class="font-bold text-lg">Перенос консультации</h3>
        <p class="text-sm text-base-content/60">
          {{ consultation.client.last_name }} {{ consultation.client.first_name }}
        </p>
        <p class="text-xs text-base-content/50 mt-0.5">
          {{ consultation.datetime_start|date:"d.m.Y H:i" }} → {{ new_dt|slice:"0:10" }} в {{ new_dt|slice:"11:16" }}
        </p>
      </div>
      <button class="btn btn-sm btn-ghost btn-circle" onclick="this.closest('dialog').remove()">✕</button>
    </div>

    <form hx-post="{% url 'consultations:move_confirm' consultation.pk %}"
          hx-target="#consult-move-modal"
          hx-swap="innerHTML">
      {% csrf_token %}
      <input type="hidden" name="datetime_start" value="{{ new_dt }}">
      <input type="hidden" name="consultant_id" value="{{ new_consultant_id }}">

      <div class="mb-4">
        <label class="label py-1"><span class="label-text font-medium">Причина переноса</span></label>
        <textarea name="transfer_reason" rows="3"
                  class="textarea textarea-bordered w-full textarea-sm"
                  placeholder="Укажите причину переноса..."
                  required autofocus></textarea>
      </div>

      <div class="modal-action">
        <button type="submit" class="btn btn-primary btn-sm">Подтвердить перенос</button>
        <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>
