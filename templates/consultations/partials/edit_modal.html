<dialog id="consult-edit-dialog" class="modal modal-middle modal-open">
  <div class="modal-box w-full max-w-md">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-lg">Редактировать консультацию</h3>
      <button class="btn btn-sm btn-ghost btn-circle" onclick="this.closest('dialog').remove()">✕</button>
    </div>

    <form id="consult-edit-form">
      {% csrf_token %}
      <input type="hidden" name="pk" value="{{ consultation.pk }}">

      <div class="mb-3">
        <label class="label py-1"><span class="label-text font-medium">Дата и время</span></label>
        <input type="datetime-local" name="datetime_start"
               value="{{ consultation.datetime_start|date:'Y-m-d' }}T{{ consultation.datetime_start|date:'H:i' }}"
               class="input input-bordered input-sm w-full">
      </div>

      <div class="mb-3">
        <label class="label py-1"><span class="label-text font-medium">Клиент</span></label>
        <input type="text" value="{{ consultation.client.last_name }} {{ consultation.client.first_name }}"
               class="input input-bordered input-sm w-full" disabled>
      </div>

      <div class="mb-4">
        <label class="label py-1"><span class="label-text font-medium">Комментарий оператора</span></label>
        <textarea name="comment" rows="3"
                  class="textarea textarea-bordered w-full textarea-sm"
                  placeholder="Краткая информация, тема консультации...">{{ consultation.comment }}</textarea>
      </div>
    </form>

    <div class="modal-action">
      <button class="btn btn-primary btn-sm"
              hx-post="{% url 'consultations:edit' consultation.pk %}"
              hx-include="#consult-edit-form"
              hx-target="#consult-edit-dialog"
              hx-swap="delete">
        Сохранить
      </button>
      <button type="button" class="btn btn-sm" onclick="this.closest('dialog').remove()">Отмена</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button onclick="this.closest('dialog').remove()">close</button>
  </form>
</dialog>
