services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DEBUG: "True"
      DATABASE_URL: postgresql://crm_user:crm_password_dev@db:5432/crm_db
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    command: celery -A config worker -l info --max-tasks-per-child=100 --time-limit=300 -E
    volumes:
      - .:/app
    environment:
      DEBUG: "False"
      DATABASE_URL: postgresql://crm_user:crm_password_dev@db:5432/crm_db
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
    depends_on:
      - db
      - redis
      - web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  celery-beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DEBUG: "False"
      DATABASE_URL: postgresql://crm_user:crm_password_dev@db:5432/crm_db
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      - db
      - redis
      - celery

  # Flower - мониторинг Celery
  flower:
    build: .
    command: celery -A config flower --port=5555 --persistent=True --db=/app/flower_data/flower.db
    volumes:
      - .:/app
      - flower_data:/app/flower_data
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      DEBUG: "False"
      DATABASE_URL: postgresql://crm_user:crm_password_dev@db:5432/crm_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      # FLOWER_BASIC_AUTH: admin:siricrm2026
    depends_on:
      - redis
      - celery
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # Redis Commander - управление Redis
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: siricrm_redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    #  - HTTP_USER=admin
    #  - HTTP_PASSWORD=siricrm2026  # Измените пароль
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  userbot:
    build: .
    command: python manage.py run_userbot
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://crm_user:crm_password_dev@db:5432/crm_db
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"


volumes:
  postgres_data:
  flower_data:
